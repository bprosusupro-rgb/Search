<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Real Browser Home</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070913;
      --panel: rgba(18,23,38,.82);
      --border: rgba(255,255,255,.14);
      --muted: #a2abc7;
      --accent: #7c5cff;
      --accent2: #00d4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.34), transparent 34%),
        radial-gradient(circle at bottom right, rgba(0,212,255,.22), transparent 34%),
        var(--bg);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(980px, calc(100vw - 48px));
      padding: 42px;
      border: 1px solid var(--border);
      border-radius: 34px;
      background: var(--panel);
      box-shadow: 0 32px 120px rgba(0,0,0,.48);
    }

    .badge {
      display: inline-flex;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-bottom: 22px;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(44px, 7vw, 86px);
      letter-spacing: -.08em;
      line-height: .92;
      background: linear-gradient(135deg, white, #b4b9ff, var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      max-width: 760px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .links {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      text-decoration: none;
      color: white;
      font-weight: 800;
      padding: 13px 17px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.08);
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Official noVNC + real Chromium</div>
    <h1>No more bad screenshot canvas.</h1>
    <p>
      This is a real Chromium window rendered through noVNC. Cookies are temporary.
      German language, timezone, and geolocation signals are enabled.
    </p>

    <div class="links">
      <a class="primary" href="https://youtube.com">YouTube</a>
      <a href="https://duckduckgo.com/?kl=de-de">DuckDuckGo Germany</a>
      <a href="https://google.de">Google Germany</a>
      <a href="https://github.com">GitHub</a>
    </div>
  </main>
</body>
</html>
